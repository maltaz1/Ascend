<svg viewBox="0 0 1024 512" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9333EA;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Circular background -->
  <circle cx="180" cy="256" r="130" fill="none" stroke="url(#logoGradient)" stroke-width="40" opacity="0.8"/>
  
  <!-- Zigzag arrow -->
  <g fill="url(#logoGradient)">
    <!-- Left arrow shaft -->
    <path d="M 180 100 L 100 180 L 140 180 L 60 280 L 100 280 L 20 380 L 100 300 L 60 300 L 140 200 L 100 200 Z" fill="url(#logoGradient)"/>
    <!-- Right upward arrow -->
    <path d="M 240 380 L 320 300 L 280 300 L 360 200 L 320 200 L 400 100 L 320 180 L 360 180 L 280 280 L 320 280 Z" fill="url(#logoGradient)"/>
  </g>
  
  <!-- Text: ASCEND -->
  <text x="420" y="330" font-size="180" font-weight="800" fill="url(#logoGradient)" font-family="'Space Grotesk', Arial, sans-serif" letter-spacing="15">ASCEND</text>
</svg>